# 发布工作流：上传 latest yml + 刷新 CDN
# 触发：GitHub Release 从 Draft 发布为 Published
# 二进制产物已在 build-release 阶段预上传到 TOS，此处只推送更新清单

name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:  # 允许在任意分支上手动触发构建（不发布）

env:
  CDN_DOMAIN: RunJianClaw.cn
  TOS_ENDPOINT: https://tos-s3-accelerate.volces.com
  TOS_BUCKET: RunJianClaw-cn
  AWS_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_SECRET_KEY }}
  AWS_DEFAULT_REGION: cn-beijing
  VOLCENGINE_ACCESS_KEY: ${{ secrets.VOLCENGINE_ACCESS_KEY }}
  VOLCENGINE_SECRET_KEY: ${{ secrets.VOLCENGINE_SECRET_KEY }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # 从 Release 下载 latest yml 文件
      - name: 下载 Release 产物
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out/release
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.yml" \
            --dir out/release

      # 上传 latest yml 到 TOS（触发 auto-updater 发现新版本）
      - name: 上传 latest yml 到 TOS
        run: |
          aws configure set default.s3.addressing_style virtual
          aws s3 cp out/release/ "s3://$TOS_BUCKET/releases/" --recursive --endpoint-url "$TOS_ENDPOINT" --include "*.yml"
          echo "latest yml 上传完成"

      # 刷新 CDN 缓存
      - name: 刷新 CDN 缓存
        run: |
          node scripts/volcengine-cdn-refresh.js \
            "https://${{ env.CDN_DOMAIN }}/releases/latest-mac.yml" \
            "https://${{ env.CDN_DOMAIN }}/releases/latest.yml"
          echo "CDN 缓存刷新已提交"
